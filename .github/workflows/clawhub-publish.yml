name: Publish to ClawHub

# Publishes the skill to ClawHub:
#   - automatically when a release tag (vX.Y.Z) is pushed, and
#   - manually via the "Run workflow" button (workflow_dispatch).
# Auth uses the CLAWHUB_TOKEN repo secret — no local login needed.
# One-time setup (done): create a clh_ token at https://clawhub.ai/dashboard and add it
# as a repo secret named CLAWHUB_TOKEN (Settings -> Secrets and variables -> Actions).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (blank = use SKILL.md frontmatter version)"
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    # contents:write is needed to create the GitHub Release (the repo default token is
    # read-only). id-token:write is needed for cosign's keyless/OIDC signing below (it
    # exchanges the job's short-lived GitHub Actions OIDC token for a Fulcio cert — no
    # signing key/secret to manage or leak). Both scoped to this job only.
    permissions:
      contents: write
      id-token: write
    # Manual-approval gate: configure required reviewers under
    # repo Settings → Environments → "release" for this gate to actually block.
    environment: release
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: "20"

      - name: Install ClawHub CLI
        # Pinned to exact version to prevent supply-chain risk from a compromised
        # or typosquatted release executing with the CLAWHUB_TOKEN release secret.
        run: npm i -g clawhub@0.22.0

      - name: Resolve & verify version
        id: ver
        run: |
          FM="$(grep -m1 '^version:' SKILL.md | awk '{print $2}')"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="$FM"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "resolved version=$VER  (SKILL.md frontmatter=$FM)"
          if [ "$VER" != "$FM" ]; then
            echo "::error::Version '$VER' does not match SKILL.md frontmatter '$FM' — bump SKILL.md first."
            exit 1
          fi

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Smoke gate — lint, tests, compile
        run: |
          # Pinned to exact versions (not `-U`): this job later authenticates with the
          # CLAWHUB_TOKEN release secret and holds contents/id-token:write, so a
          # compromised or typosquatted pytest/ruff release must not be able to execute
          # here (C-183 — same supply-chain discipline as the pinned clawhub@0.22.0
          # install above). Bump these deliberately, like clawhub@ / markdownlint-cli@.
          python -m pip install pytest==7.4.4 ruff==0.15.20
          python -m pytest -q
          ruff check .
          python -m compileall clawseccheck

      - name: Generate trusted engine digest (SHA256SUMS.txt)
        # Reuses clawseccheck/integrity.py's package_digest() — the exact same
        # sorted "relpath:sha256hex" combine logic that `--verify-self` prints —
        # so the file a user diffs against is byte-for-byte the same computation,
        # just produced out-of-band (from this checked-out tag, in CI) instead of
        # from inside their own possibly-tampered install.
        run: |
          python3 - <<'PYEOF'
          from clawseccheck import __version__
          from clawseccheck.integrity import package_digest

          combined, per_file = package_digest()
          lines = [
              f"ClawSecCheck {__version__} — engine source digest (SHA-256)",
              f"combined : {combined}",
              "",
          ]
          for name, digest in sorted(per_file.items()):
              lines.append(f"  {digest}  {name}")
          lines.append("")
          lines.append(
              "Compare the 'combined' value against the output of `clawseccheck --verify-self`."
          )
          lines.append("Any mismatch means a source file was modified after this release.")
          with open("SHA256SUMS.txt", "w") as f:
              f.write("\n".join(lines) + "\n")
          PYEOF
          echo "Wrote SHA256SUMS.txt:" && cat SHA256SUMS.txt

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign SHA256SUMS.txt (cosign keyless/OIDC)
        # Keyless signing: cosign exchanges this job's GitHub Actions OIDC token
        # (id-token: write, above) for a short-lived cert from Fulcio, signs the
        # blob, and uploads the signature to the public Rekor transparency log —
        # no signing key or secret to generate, store, or rotate. Anyone can later
        # verify SHA256SUMS.txt was produced by *this* repo's release workflow with
        # `cosign verify-blob` (exact command published in README/FAQ), without ever
        # trusting a key we'd have to keep secret.
        run: |
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.txt.sig \
            --output-certificate SHA256SUMS.txt.pem \
            SHA256SUMS.txt
          echo "Signed SHA256SUMS.txt -> SHA256SUMS.txt.sig / SHA256SUMS.txt.pem"

      - name: Log in to ClawHub
        # Token is passed only via env — never echoed or printed.
        run: clawhub login --token "$CLAWHUB_TOKEN"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Stage publishable files (exclude tests/ + fixtures/)
        # ClawSecCheck is a security auditor: tests/ and fixtures/ contain intentionally
        # vulnerable example configs (docker.sock, allowFrom "*", dangerouslyAllowPrivateNetwork)
        # that the engine DETECTS in others. They are test data, never the skill's own config —
        # but a scanner pointed at the published tree mis-reads them as live settings. The smoke
        # gate above already ran the full suite on the complete checkout; we publish only the
        # runtime + docs so the audited artifact contains no decoy configs.
        #
        # We still nest the staging dir under dist/ with basename "clawseccheck" (not the old
        # "dist-skill" → "Dist Skill", B-015) so the dir-derived fallback name is sane, but the
        # authoritative title is now set explicitly with the --name flag below — the dir
        # basename is only a fallback. dist/clawseccheck also avoids colliding with the
        # clawseccheck/ package during the cp.
        run: |
          rm -rf dist && mkdir -p dist/clawseccheck
          cp -r clawseccheck SKILL.md README.md LICENSE \
                SECURITY.md SECURITY_MODEL.md CHANGELOG.md pyproject.toml docs audit.py \
                dist/clawseccheck/
          find dist/clawseccheck -name '__pycache__' -type d -prune -exec rm -rf {} + || true
          echo "Staged for publish:" && ls -1 dist/clawseccheck

      - name: Publish skill
        # --name sets the human-facing ClawHub title (grounded: the CLI's `publish --help`
        # lists "--name <name>  Display name"). Without it ClawHub falls back to the
        # title-cased dir basename ("Clawseccheck"). This value MUST equal SKILL.md
        # metadata.display_name.en — tests/test_publish_workflow.py fails the build if they
        # drift, so the title stays a single source of truth (B-015 fix-item 2).
        run: >
          clawhub publish ./dist/clawseccheck
          --slug clawseccheck
          --owner gl0di
          --name "ClawSecCheck — OpenClaw Security Self-Audit"
          --version "${{ steps.ver.outputs.version }}"
          --changelog "Release ${{ steps.ver.outputs.version }} (${{ github.sha }})"

      # Create a matching GitHub Release so the "Latest release" badge tracks the tag.
      # Uses the runner's built-in gh CLI (no third-party action → respects the
      # github-owned+verified Actions policy). Notes are pulled from CHANGELOG.md.
      # Also attaches the signed digest (SHA256SUMS.txt + cosign .sig/.pem) generated
      # above, via the same `gh` CLI (`release upload`) rather than a second
      # release-management action, so there is one mechanism for release assets.
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          NOTES="$(awk -v v="## [$VER]" 'index($0,v){f=1;next} /^## \[/{f=0} f' CHANGELOG.md)"
          [ -z "$NOTES" ] && NOTES="Release ${GITHUB_REF_NAME} — see CHANGELOG.md."
          gh release create "${GITHUB_REF_NAME}" --verify-tag \
            --title "ClawSecCheck ${GITHUB_REF_NAME}" --notes "$NOTES" \
            || echo "GitHub Release already exists for ${GITHUB_REF_NAME}"
          gh release upload "${GITHUB_REF_NAME}" \
            SHA256SUMS.txt SHA256SUMS.txt.sig SHA256SUMS.txt.pem \
            --clobber
