name: Publish to ClawHub

# Auto-publishes the skill to ClawHub whenever a release tag (vX.Y.Z) is pushed.
# Setup (one-time, done by the repo owner):
#   1. Create a ClawHub API token (clh_...) from https://clawhub.ai/dashboard.
#   2. Add it as a GitHub repo secret named CLAWHUB_TOKEN
#      (Settings -> Secrets and variables -> Actions -> New repository secret).
# After that, every  git push origin vX.Y.Z  publishes that release automatically.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      # Guard: the SKILL.md frontmatter version must match the pushed tag, so ClawHub
      # never indexes a mismatched/stale version (this is what showed 0.1.0 before).
      - name: Verify SKILL.md version matches the tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FM="$(grep -m1 '^version:' SKILL.md | awk '{print $2}')"
          echo "tag=$TAG  SKILL.md version=$FM"
          if [ "$TAG" != "$FM" ]; then
            echo "::error::Tag v$TAG does not match SKILL.md frontmatter version $FM — bump SKILL.md before tagging."
            exit 1
          fi

      - name: Log in to ClawHub
        run: clawhub login --token "$CLAWHUB_TOKEN"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish skill
        run: clawhub skill publish . --json
