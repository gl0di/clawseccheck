name: CI

on:
  push:
  pull_request:

jobs:
  # -- L1: lint + test ----------------------------------------------------------
  test:
    # C-160: SKILL.md advertises os:[darwin,linux,win32]. Add a macOS (darwin) axis so the
    # advertised POSIX platform is actually proven to run + pass, not just assumed. Windows
    # is still advertised for the read-only audit but its local-store hardening degrades
    # (see safeio.py / README) — a green Windows CI would not make O_NOFOLLOW/chmod work, so
    # the honest fix is disclosure, not a rubber-stamp OS axis.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, python-version: "3.9"}
          - {os: ubuntu-latest, python-version: "3.12"}
          - {os: macos-latest, python-version: "3.12"}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test tools (the package itself has zero runtime deps)
        # pytest/ruff pinned to exact versions (not latest) so a compromised or
        # typosquatted release can't execute in CI — same supply-chain discipline as the
        # pinned markdownlint-cli@ / clawhub@ installs (C-183). Bump these deliberately.
        run: python -m pip install --upgrade pip && python -m pip install pytest==7.4.4 ruff==0.15.20
      - name: Lint
        run: ruff check .
      - name: Tests
        run: python -m pytest -q
      - name: Hunt advisory (ClawRange L2)
        run: |
          if [ -f "${{ github.workspace }}/../clawrange/hunt.py" ]; then
            python ../clawrange/hunt.py --all || true
          else
            echo "ClawRange hunt.py not available in this CI context (private repo) -- skipped"
          fi

  # -- L2: markdown quality -----------------------------------------------------
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.44.0
      - name: Lint Markdown
        run: |
          markdownlint '**/*.md' \
            --ignore node_modules \
            --ignore CHANGELOG.md \
            --ignore SKILL.md \
            --ignore SECURITY.md \
            --ignore SECURITY_MODEL.md \
            --config .markdownlint.jsonc

  # -- L3: dependency review (PRs only) ----------------------------------------
  dependency-review:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: high

  # -- L4: secret scan ----------------------------------------------------------
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION="8.27.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan for secrets (gitleaks)
        run: gitleaks detect --source=. --config=.gitleaks.toml --redact --no-banner

  # -- L5: commit integrity -----------------------------------------------------
  commit-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: No AI-agent co-author in commits
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="origin/${{ github.base_ref }}..HEAD"
          else
            RANGE="HEAD~1..HEAD"
          fi
          FOUND=$(git log "$RANGE" --format="%H %B" \
            | grep -iE "co-authored-by:.*(claude|anthropic|cursor|copilot|aider|codeium)" || true)
          if [ -n "$FOUND" ]; then
            echo "::error::AI co-author tag detected in commit(s):"
            echo "$FOUND"
            exit 1
          fi
          echo "OK: no AI co-author tags"

      - name: No agent config files in git tree
        run: |
          FORBIDDEN="CLAUDE.md CLAUDE.local.md .claude .cursorrules .cursor .aider .copilot"
          FOUND=""
          for f in $FORBIDDEN; do
            MATCH=$(git ls-files "$f" 2>/dev/null || true)
            [ -n "$MATCH" ] && FOUND="$FOUND $f"
          done
          if [ -n "$FOUND" ]; then
            echo "::error::Agent config file(s) found in git tree:$FOUND"
            echo "Add them to .gitignore and untrack with 'git rm --cached'."
            exit 1
          fi
          echo "OK: no agent config files in git tree"

      - name: Author identity check (gl0di only)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="origin/${{ github.base_ref }}..HEAD"
          else
            RANGE="HEAD~1..HEAD"
          fi
          OTHERS=$(git log "$RANGE" --format="%an <%ae>" \
            | grep -v "gl0di" || true)
          if [ -n "$OTHERS" ]; then
            echo "::warning::Non-canonical author(s) in this push:"
            echo "$OTHERS"
            echo "Expected: gl0di <gl0di@users.noreply.github.com>"
          else
            echo "OK: author identity canonical (gl0di)"
          fi
